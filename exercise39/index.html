<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="./main.js" defer></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>Language Translator</h1>

      <form action="">
        <div class="fromEl">
          <label for="">From</label>
          <select class="selectEl" name="" value="" id="fromLangEl">
            <option value="">Choose language</option>
          </select>
        </div>
        <div class="fromEl">
          <label for="">To</label>
          <select class="selectEl" name="" value="" id="toLangEl">
            <option value="">Choose language</option>
          </select>
        </div>

        <div class="fromEl">
          <label for="">Text to translate</label>
          <textarea rows="6" name="" id="" class="textTranslate"></textarea>
        </div>

        <button class="translateBtn">Translate</button>
      </form>

      <h2>Translated Text:</h2>
      <p class="translatedText"></p>
    </div>
  </body>
</html>
